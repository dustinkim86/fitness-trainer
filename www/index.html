// ── Audio (Web Audio API) ──
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended')_audioCtx.resume();
  return _audioCtx;
}
function playBeep(freq=880,dur=0.1,vol=0.35){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playCountdownBeep(){playBeep(440,0.1,0.3);}
function playEndBeep(){
  playBeep(660,0.12,0.45);
  setTimeout(()=>playBeep(880,0.12,0.45),160);
  setTimeout(()=>playBeep(1100,0.22,0.45),320);
}

function initExSets(ex,defaultWeight){
  return Array.from({length:ex.sets},()=>({
    weight:defaultWeight!=null&&defaultWeight!==''?String(defaultWeight):'',
    reps:'',isWarmup:!!ex.wu,done:false,
  }));
}
function exVolume(sets){
  if(!sets)return 0;
  return sets.reduce((sum,s)=>{
    if(s.done&&!s.isWarmup){const w=parseFloat(s.weight)||0;const r=parseInt(s.reps)||0;return sum+w*r;}
    return sum;
  },0);
}

function Dot({done,onClick}){

      style={{width:26,height:26,borderRadius:'50%',flexShrink:0,cursor:'pointer',

        display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.12s'}}>
      {done&&<svg width="13" height="13" viewBox="0 0 13 13">
        <polyline points="2,7 5.5,10.5 11,3" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>}
    </div>
  );
}

function ExerciseCard({ex,sets,onUpdate,accentColor,onRestStart,prevSets,weightUnit,onToggleUnit}){
  const [showGif,setShowGif]=useState(false);
  const [menuIdx,setMenuIdx]=useState(null);
  const [showNote,setShowNote]=useState(false);
  const [gifErr,setGifErr]=useState(false);

  const vol=exVolume(sets);
  const prevVol=exVolume(prevSets||[]);
  const volDiff=(vol>0&&prevVol>0)?(vol-prevVol):null;
  const doneCnt=sets.filter(s=>s.done).length;
  const allDone=doneCnt===sets.length&&sets.length>0;
  const ac=accentColor||T;

  function dispW(kgVal){
    if(kgVal===''||kgVal==null)return '';
    const n=parseFloat(kgVal);
    if(isNaN(n))return kgVal;
    if(weightUnit==='lbs')return (n*2.20462).toFixed(1);
    return kgVal;
  }
  function storeW(inputVal){
    if(inputVal===''||inputVal==null)return '';
    const n=parseFloat(inputVal);
    if(isNaN(n))return inputVal;
    if(weightUnit==='lbs')return (n/2.20462).toFixed(2);
    return inputVal;
  }

  function upd(i,field,val){onUpdate(ex.id,sets.map((s,j)=>j===i?{...s,[field]:val}:s));}
  function toggleDone(i){const nd=!sets[i].done;upd(i,'done',nd);if(nd)onRestStart(ex.rest,ex.name);}
  function toggleWarmup(i){upd(i,'isWarmup',!sets[i].isWarmup);setMenuIdx(null);}
  function addSet(){
    const last=sets.length>0?sets[sets.length-1]:{weight:'',reps:'',isWarmup:false,done:false};
    onUpdate(ex.id,[...sets,{weight:last.weight,reps:last.reps,isWarmup:false,done:false}]);
  }
  function delSet(i){onUpdate(ex.id,sets.filter((_,j)=>j!==i));setMenuIdx(null);}

  return(
    <div style={{background:'var(--bg2)',borderRadius:12,padding:'12px 12px 10px',
      marginBottom:8,borderLeft:`3px solid ${allDone?T:ex.wu?'#2a2a2a':ac}`,
      opacity:allDone?0.7:1,transition:'opacity 0.2s'}}>

      <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:10}}>
        {ex.gif&&!gifErr&&(

function CalendarView({calMonth,setCalMonth,calData,calLoading,onSelectDate}){
  const {year,month}=calMonth;
  const firstDay=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  function prev(){setCalMonth(m=>m.month===1?{year:m.year-1,month:12}:{year:m.year,month:m.month-1});}
  function next(){setCalMonth(m=>m.month===12?{year:m.year+1,month:1}:{year:m.year,month:m.month+1});}
  return(
    <div style={{padding:'0 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <button onClick={prev} style={{width:38,height:38,border:'0.5px solid var(--border)',borderRadius:10,background:'transparent',color:'var(--text)',fontSize:20}}>‹</button>
        <div style={{fontSize:17,fontWeight:800,color:'var(--text)',letterSpacing:'-0.3px'}}>{year}년 {month}월</div>
        <button onClick={next} style={{width:38,height:38,border:'0.5px solid var(--border)',borderRadius:10,background:'transparent',color:'var(--text)',fontSize:20}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:8}}>
        {['일','월','화','수','목','금','토'].map((d,i)=>(
          <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,padding:'4px 0',
            color:i===0?'#ff6060':i===6?'#6090ff':'var(--text3)',letterSpacing:'0.05em'}}>{d}</div>
        ))}
      </div>
      {calLoading?<div style={{textAlign:'center',color:'var(--text3)',fontSize:13,padding:32}}>불러오는 중...</div>:(
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {cells.map((day,i)=>{
            if(!day)return<div key={i}/>;
            const dk=`${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const isToday=dk===DATE_KEY;const info=calData[dk];const dow=i%7;
            return(
              <button key={i} onClick={()=>info&&onSelectDate(dk)} style={{
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                padding:'8px 0',borderRadius:10,minHeight:48,
                border:isToday?`1.5px solid ${A}`:'0.5px solid transparent',
                background:isToday?`rgba(239,159,39,0.1)`:'transparent',
                color:isToday?A:dow===0?'#ff6060':dow===6?'#6090ff':'var(--text)',
                cursor:info?'pointer':'default',
              }}>
                <span style={{fontSize:14,fontWeight:isToday?800:400}}>{day}</span>
                {info&&(
                  <div style={{display:'flex',gap:2,marginTop:3}}>
                    {info.workout&&<div style={{width:5,height:5,borderRadius:'50%',background:T}}/>}
                    {info.checks&&<div style={{width:5,height:5,borderRadius:'50%',background:'var(--text3)'}}/>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      )}
      <div style={{marginTop:16,display:'flex',gap:16,fontSize:11,color:'var(--text3)'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:T,display:'inline-block'}}/>운동
        </span>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'var(--text3)',display:'inline-block'}}/>식단/영양제
        </span>
      </div>
    </div>
  );
}

function HistoryView({dateKey,historyData,historyLoading,onClose}){
  if(!dateKey)return null;
  const dStr=new Date(dateKey+'T12:00:00+09:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  return(
    <div style={{position:'fixed',inset:0,zIndex:40,background:'var(--bg)',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'max(16px,env(safe-area-inset-top)) 16px 14px',borderBottom:'0.5px solid var(--border)',
        display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <div style={{fontSize:10,color:'var(--text3)',letterSpacing:'0.1em',fontWeight:700,textTransform:'uppercase',marginBottom:4}}>과거 기록</div>
          <div style={{fontSize:16,fontWeight:800,color:'var(--text)',letterSpacing:'-0.3px'}}>{dStr}</div>
        </div>
        <button onClick={onClose} style={{width:36,height:36,border:'0.5px solid var(--border)',
          borderRadius:10,background:'transparent',color:'var(--text)',fontSize:18}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px',WebkitOverflowScrolling:'touch'}}>
        {historyLoading&&<div style={{textAlign:'center',padding:48,color:'var(--text3)',fontSize:13}}>불러오는 중...</div>}
        {!historyLoading&&historyData&&(()=>{
          const{checks,workout}=historyData;
          let dayVol=0;const exList=[];
          for(const[,w] of Object.entries(WORKOUT)){
            for(const ex of w.exercises){
              const exSets=workout[ex.id];
              if(exSets&&exSets.some(s=>s.done)){
                const vol=exVolume(exSets);dayVol+=vol;
                exList.push({ex,sets:exSets,vol,color:w.color});
              }
            }
          }
          const histDow=new Date(dateKey+'T12:00:00+09:00').getDay();
          const histMeals=histDow===0?MEALS_REST:MEALS_WORKOUT;
          const mDone=histMeals.filter(m=>checks[`meal_${m.id}`]).length;
          const mobDone=MOBILITY.filter(m=>checks[`mob_${m.id}`]).length;
          return(
            <>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
                {[{label:'총 볼륨',value:dayVol>0?`${dayVol.toLocaleString()}kg`:'—',color:T},
                  {label:'끼니',value:`${mDone}/${histMeals.length}`,color:A},
                  {label:'모빌리티',value:`${mobDone}/${MOBILITY.length}`,color:'#7F77DD'},
                ].map(item=>(
                  <div key={item.label} style={{textAlign:'center',padding:'14px 8px',background:'var(--bg2)',borderRadius:12}}>
                    <div style={{fontSize:20,fontWeight:800,color:item.color}}>{item.value}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{item.label}</div>
                  </div>
                ))}
              </div>
              {exList.length>0&&<>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.1em',textTransform:'uppercase'}}>운동 기록</div>
                {exList.map(({ex,sets,vol,color})=>(
                  <div key={ex.id} style={{background:'var(--bg2)',borderRadius:12,padding:'12px',marginBottom:8,borderLeft:`3px solid ${color}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{ex.name}</div>
                      {vol>0&&<div style={{fontSize:12,color:A,fontWeight:700}}>볼륨 {vol.toLocaleString()}kg</div>}
                    </div>
                    {sets.map((s,i)=>(
                      <div key={i} style={{display:'flex',gap:8,alignItems:'center',fontSize:13,marginBottom:3,
                        opacity:s.done?1:0.4,color:s.done?'var(--text)':'var(--text3)'}}>
                        <span style={{width:20,textAlign:'center',fontSize:11,fontWeight:700,color:s.isWarmup?'var(--text3)':color}}>
                          {s.isWarmup?'W':i+1}
                        </span>
                        <span style={{flex:1}}>{s.weight||'—'}kg × {s.reps||'—'}회</span>
                        {s.isWarmup&&<span style={{fontSize:10,color:'var(--text3)',background:'var(--bg3)',padding:'1px 5px',borderRadius:4}}>웜업</span>}
                        {s.done&&<svg width="11" height="11" viewBox="0 0 11 11">
                          <polyline points="1,5.5 4,8.5 10,2" fill="none" stroke={T} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>}
                      </div>
                    ))}
                  </div>
                ))}
              </>}
              {exList.length===0&&<div style={{textAlign:'center',color:'var(--text3)',fontSize:13,padding:'32px 0'}}>운동 기록 없음</div>}
            </>
          );
        })()}
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

function App(){
  const [loading,setLoading]=useState(true);
  const [dbErr,setDbErr]=useState(null);
  const [saveErr,setSaveErr]=useState(null);
  const [checks,setChecks]=useState({});
  const [workoutSets,setWorkoutSets]=useState({});
  const [prevWorkout,setPrevWorkout]=useState({});
  const [weightUnit,setWeightUnit]=useState('kg');
  const [wDay,setWDay]=useState(TODAY_DAY);
  const [subTab,setSubTab]=useState('운동');
  const [restTimer,setRestTimer]=useState(null); // {endTime, total, name}
  const [timerRem,setTimerRem]=useState(0);
  const [showCal,setShowCal]=useState(false);
  const [calMonth,setCalMonth]=useState({year:TODAY_KST.getUTCFullYear(),month:TODAY_KST.getUTCMonth()+1});
  const [calData,setCalData]=useState({});
  const [calLoading,setCalLoading]=useState(false);
  const [historyDate,setHistoryDate]=useState(null);
  const [historyData,setHistoryData]=useState(null);
  const [historyLoading,setHistoryLoading]=useState(false);
  const intervalRef=useRef(null);
  const timeoutRef=useRef(null);
  const lastBeepRef=useRef(-1);

  useEffect(()=>{
    let live=true;
    (async()=>{
      try{
        const[c,wv2,wg,recentRows]=await Promise.all([
          dbGet(DATE_KEY,'checks'),
          dbGet(DATE_KEY,'workout_v2'),
          dbGet('global','weights'),
          dbGetRecentWorkouts(DATE_KEY),
        ]);
        if(!live)return;
        setChecks(c||{});
        const pw={};
        for(const row of(recentRows||[])){
          try{
            const w=JSON.parse(row.value);
            for(const[exId,exSets]of Object.entries(w)){
              if(!pw[exId]&&Array.isArray(exSets)&&exSets.some(s=>s.done)){
                pw[exId]=exSets;
              }
            }
          }catch(e){}
        }
        setPrevWorkout(pw);
        const ws={};
        for(const w of Object.values(WORKOUT)){
          for(const ex of w.exercises){
            if(wv2&&wv2[ex.id]){
              ws[ex.id]=wv2[ex.id];
            }else if(pw[ex.id]){
              ws[ex.id]=pw[ex.id].map(s=>({...s,done:false}));
            }else{
              ws[ex.id]=initExSets(ex,wg?.[ex.id]);
            }
          }
        }
        setWorkoutSets(ws);
      }catch(err){
        if(!live)return;
        setDbErr(`연결 오류 (${err.message})`);
      }finally{if(live)setLoading(false);}
    })();
    return()=>{live=false;};
  },[]);

  useEffect(()=>{
    function checkDate(){if(kstDateKey()!==DATE_KEY)window.location.reload();}
    function onVis(){if(!document.hidden)checkDate();}
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('focus',checkDate);
    window.addEventListener('pageshow',checkDate);
    const iv=setInterval(checkDate,60000);
    return()=>{
      document.removeEventListener('visibilitychange',onVis);
      window.removeEventListener('focus',checkDate);
      window.removeEventListener('pageshow',checkDate);
      clearInterval(iv);
    };
  },[]);

  // Timestamp-based timer — works in background
  useEffect(()=>{
    if(!restTimer){clearInterval(intervalRef.current);return;}
    lastBeepRef.current=-1;
    function tick(){
      const rem=Math.max(0,Math.ceil((restTimer.endTime-Date.now())/1000));
      setTimerRem(rem);
      if(rem===0){
        if(lastBeepRef.current!==0){
          lastBeepRef.current=0;
          playEndBeep();
          timeoutRef.current=setTimeout(()=>setRestTimer(null),2000);
        }
      }else if(rem<=3&&lastBeepRef.current!==rem){
        lastBeepRef.current=rem;
        playCountdownBeep();
      }
    }
    tick();
    intervalRef.current=setInterval(tick,250);
    return()=>clearInterval(intervalRef.current);
  },[restTimer]);

  useEffect(()=>{
    if(!showCal)return;
    setCalLoading(true);
    dbGetMonth(calMonth.year,calMonth.month)
      .then(rows=>{
        const data={};
        for(const row of rows){
          if(!data[row.date_key])data[row.date_key]={};
          if(row.store_key==='workout_v2')data[row.date_key].workout=true;
          if(row.store_key==='checks')data[row.date_key].checks=true;
        }
        setCalData(data);
      })
      .catch(e=>console.error(e))
      .finally(()=>setCalLoading(false));
  },[calMonth,showCal]);

  useEffect(()=>{
    if(!historyDate){setHistoryData(null);return;}
    setHistoryLoading(true);
    Promise.all([dbGet(historyDate,'checks'),dbGet(historyDate,'workout_v2')])
      .then(([c,w])=>setHistoryData({checks:c||{},workout:w||{}}))
      .catch(e=>console.error(e))
      .finally(()=>setHistoryLoading(false));
  },[historyDate]);

  const toggle=useCallback((key)=>{
    if(kstDateKey()!==DATE_KEY){window.location.reload();return;}
    setChecks(prev=>{
      const next={...prev,[key]:!prev[key]};
      dbSet(DATE_KEY,'checks',next).then(()=>setSaveErr(null)).catch(()=>setSaveErr('저장 실패'));
      return next;
    });
  },[]);

  const saveWS=useCallback((ws)=>{
    dbSet(DATE_KEY,'workout_v2',ws).then(()=>setSaveErr(null)).catch(()=>setSaveErr('저장 실패'));
  },[]);

  const updateExSets=useCallback((exId,newSets)=>{
    setWorkoutSets(prev=>{const next={...prev,[exId]:newSets};saveWS(next);return next;});
  },[saveWS]);

  const startRest=useCallback((restTime,name)=>{
    clearTimeout(timeoutRef.current);
    clearInterval(intervalRef.current);
    lastBeepRef.current=-1;
    setRestTimer({endTime:Date.now()+restTime*1000,total:restTime,name});
  },[]);

  function adjustTimer(delta){
    setRestTimer(p=>{
      if(!p)return p;
      const newEnd=Math.max(Date.now()+1000,p.endTime+delta*1000);
      const newTotal=Math.max(1,p.total+delta);
      return{...p,endTime:newEnd,total:newTotal};
    });
  }

  const toggleUnit=useCallback(()=>setWeightUnit(u=>u==='kg'?'lbs':'kg'),[]);

  const wo=WORKOUT[wDay];
  const wdayExes=wo?.exercises||[];
  const totalS=wdayExes.reduce((a,e)=>a+(workoutSets[e.id]?.length||e.sets),0);
  const doneS=wdayExes.reduce((a,e)=>a+(workoutSets[e.id]?.filter(s=>s.done).length||0),0);
  const dayVol=useMemo(()=>wdayExes.reduce((a,e)=>a+exVolume(workoutSets[e.id]||[]),0),[workoutSets,wDay]);
  const isRestDay=wDay==='일';
  const meals=isRestDay?MEALS_REST:MEALS_WORKOUT;
  const macroTarget={kcal:2350,carbs:300,protein:120,fat:75};
  const isDateStale=kstDateKey()!==DATE_KEY;
  const todayChecks=isDateStale?{}:checks;
  const mealDone=meals.filter(m=>todayChecks[`meal_${m.id}`]).length;
  const suppDone=SUPPS.filter(s=>todayChecks[`sup_${s.id}`]).length;
  const mobDone=MOBILITY.filter(m=>todayChecks[`mob_${m.id}`]).length;
  const timerVisible=!!(restTimer&&timerRem>0);

  if(loading)return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',alignItems:'center',justifyContent:'center',gap:12,background:'#0f0f0f'}}>
      <div style={{fontSize:10,color:A,letterSpacing:'0.2em',fontWeight:800,textTransform:'uppercase',marginBottom:8}}>JUNHO FITNESS</div>
      <div style={{fontSize:15,fontWeight:400,color:'#555'}}>기록 불러오는 중</div>
      <div style={{position:'relative',width:100,height:2,background:'#1e1e1e',borderRadius:1,overflow:'hidden',marginTop:8}}>
        <div style={{position:'absolute',top:0,height:'100%',width:'40%',background:A,borderRadius:1,animation:'bar 1s ease-in-out infinite'}}/>
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'var(--bg)'}}>

      {/* ── header ── */}
      <div style={{padding:'max(16px,env(safe-area-inset-top)) 16px 12px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:9,color:A,letterSpacing:'0.18em',fontWeight:800,textTransform:'uppercase',marginBottom:6}}>JUNHO FITNESS</div>
            <div style={{fontSize:24,fontWeight:800,color:'#fff',letterSpacing:'-0.5px',lineHeight:1.1}}>{DATE_WEEKDAY}</div>
            <div style={{fontSize:14,color:'var(--text3)',marginTop:2,fontWeight:400}}>{DATE_MD}</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
            <div style={{textAlign:'right'}}>
              {!isRestDay&&(
                <div style={{marginBottom:4}}>
                  <span style={{fontSize:11,padding:'3px 9px',borderRadius:20,background:'rgba(239,159,39,0.12)',color:A,fontWeight:700}}>{doneS}/{totalS}세트</span>
                </div>
              )}
              <div>
                <span style={{fontSize:11,padding:'3px 9px',borderRadius:20,background:'rgba(29,158,117,0.12)',color:T,fontWeight:700}}>{mealDone}/{meals.length}끼니</span>
              </div>
            </div>
            <button onClick={()=>setShowCal(true)} style={{
              width:38,height:38,border:'0.5px solid var(--border)',borderRadius:10,
              background:'transparent',fontSize:17,display:'flex',alignItems:'center',justifyContent:'center',
            }}>📅</button>
          </div>
        </div>
        {(dbErr||saveErr)&&<div style={{marginTop:8,fontSize:11,color:'#ff4466',background:'rgba(255,68,102,0.08)',borderRadius:6,padding:'4px 8px'}}>{dbErr||saveErr}</div>}
      </div>

      {/* ── day tabs ── */}
      <div style={{display:'flex',gap:6,padding:'0 16px 12px',overflowX:'auto',flexShrink:0}}>
        {['일','월','화','수','목','금','토'].map(d=>{
          const sel=wDay===d;const isToday=d===TODAY_DAY;
          return(
            <button key={d} onClick={()=>{setWDay(d);clearTimeout(timeoutRef.current);setRestTimer(null);}} style={{
              padding:'6px 14px',fontSize:13,fontWeight:sel?800:500,
              border:'none',borderRadius:20,flexShrink:0,
              background:sel?A:'#1a1a1a',
              color:sel?'#0f0f0f':isToday?'#fff':'var(--text3)',
              transition:'all 0.15s',position:'relative',
            }}>
              {d}
              {isToday&&!sel&&<div style={{position:'absolute',bottom:3,left:'50%',transform:'translateX(-50%)',
                width:3,height:3,borderRadius:'50%',background:A}}/>}
            </button>
          );
        })}
      </div>

      {/* ── sub-tabs ── */}
      <div style={{display:'flex',borderBottom:'1px solid #1a1a1a',padding:'0 12px',flexShrink:0}}>
        {['운동','식단','영양제'].map(t=>{
          const sel=subTab===t;
          return(
            <button key={t} onClick={()=>setSubTab(t)} style={{
              padding:'10px 12px',fontSize:14,fontWeight:sel?800:400,
              border:'none',borderBottom:sel?`2px solid ${A}`:'2px solid transparent',
              marginBottom:-1,background:'transparent',
              color:sel?'#fff':'var(--text3)',transition:'all 0.15s',
            }}>{t}</button>
          );
        })}
      </div>

      {/* ── content ── */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 0',WebkitOverflowScrolling:'touch'}}>

        {/* 운동 — 휴식일 */}
        {subTab==='운동'&&isRestDay&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'56px 20px',gap:12}}>
            <div style={{fontSize:52,marginBottom:4}}>🧘</div>
            <div style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-0.3px'}}>휴식일</div>
            <div style={{fontSize:14,color:'var(--text3)',textAlign:'center',lineHeight:1.8}}>
              오늘은 쉬어가는 날.<br/>모빌리티 루틴만 챙겨도 충분해요.
            </div>
            <button onClick={()=>setSubTab('식단')} style={{
              marginTop:16,padding:'12px 24px',fontSize:14,fontWeight:700,
              border:`1px solid ${A}40`,borderRadius:20,background:`rgba(239,159,39,0.08)`,color:A,
            }}>식단 확인하기</button>
          </div>
        )}

        {/* 운동 — 운동 있는 날 */}
        {subTab==='운동'&&wo&&!isRestDay&&<>
          {/* summary */}
          <div style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginBottom:10,borderLeft:`3px solid ${wo.color}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:wo&&dayVol>0?10:6}}>
              <div>
                <div style={{fontSize:12,color:wo.color,fontWeight:700,letterSpacing:'0.05em',marginBottom:4}}>{wo.name.toUpperCase()}</div>
                {dayVol>0&&<div style={{fontSize:12,color:'var(--text3)',fontWeight:400}}>총 볼륨 <span style={{color:A,fontWeight:700}}>{dayVol.toLocaleString()}kg</span></div>}
              </div>
              <div style={{textAlign:'right'}}>
                <span style={{fontSize:36,fontWeight:800,color:wo.color,lineHeight:1}}>{doneS}</span>
                <span style={{fontSize:14,color:'var(--text3)',fontWeight:400}}> / {totalS}</span>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:2,letterSpacing:'0.05em'}}>SETS</div>
              </div>
            </div>
            <div style={{height:3,background:'#2a2a2a',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${totalS>0?Math.round((doneS/totalS)*100):0}%`,background:wo.color,transition:'width 0.4s'}}/>
            </div>
          </div>

          {/* exercises */}
          {wo.exercises.map(ex=>(
            <ExerciseCard key={ex.id} ex={ex}
              sets={workoutSets[ex.id]||initExSets(ex)}
              onUpdate={updateExSets}
              accentColor={wo.color}
              onRestStart={startRest}
              prevSets={prevWorkout[ex.id]}
              weightUnit={weightUnit}
              onToggleUnit={toggleUnit}/>
          ))}

          {/* mobility */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'20px 0 10px'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',letterSpacing:'0.1em',textTransform:'uppercase'}}>모빌리티</div>
            <span style={{fontSize:12,color:T,fontWeight:700}}>{mobDone}/{MOBILITY.length}</span>
          </div>
          {MOBILITY.map(m=>{
            const k=`mob_${m.id}`;const done=!!todayChecks[k];
            return(
              <div key={m.id} onClick={()=>toggle(k)}
                style={{background:'var(--bg2)',borderRadius:10,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
                  marginBottom:6,opacity:done?0.45:1,transition:'opacity 0.2s'}}>
                <Dot done={done} onClick={()=>toggle(k)}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:done?400:600,textDecoration:done?'line-through':'none',color:'var(--text)'}}>{m.name}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{m.detail}</div>
                </div>
                {m.video&&(
                  <a href={m.video} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                    style={{flexShrink:0,display:'flex',alignItems:'center',gap:4,fontSize:11,padding:'4px 8px',
                      borderRadius:6,border:'0.5px solid rgba(255,60,60,0.3)',background:'rgba(255,60,60,0.06)',
                      color:'#ff5555',textDecoration:'none',fontWeight:700}}>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <polygon points="2,1.5 9,5 2,8.5" fill="#ff5555"/>
                    </svg>영상
                  </a>
                )}
              </div>
            );
          })}
        </>}

        {/* 식단 */}
        {subTab==='식단'&&<>
          <div style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase'}}>일일 목표 매크로</div>
              <div style={{fontSize:10,color:A,fontWeight:700}}>{macroTarget.kcal.toLocaleString()} kcal</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
              {[{l:'탄수화물',v:macroTarget.carbs,u:'g',c:'#378ADD'},
                {l:'순단백질',v:macroTarget.protein,u:'g',c:T},
                {l:'지방',v:macroTarget.fat,u:'g',c:'#D4537E'}].map(m=>(
                <div key={m.l} style={{textAlign:'center',background:'var(--bg3)',borderRadius:10,padding:'10px 6px'}}>
                  <div style={{fontSize:20,fontWeight:800,color:m.c}}>{m.v}g</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{m.l}</div>
                </div>
              ))}
            </div>
            <div style={{paddingTop:10,borderTop:'0.5px solid var(--border)',display:'flex',justifyContent:'space-between',fontSize:12}}>
              <span style={{color:'var(--text3)'}}>식사 완료</span>
              <span style={{fontWeight:700,color:T}}>{mealDone} / {meals.length} 끼니</span>
            </div>
          </div>
          {meals.map(meal=>{
            const k=`meal_${meal.id}`;const done=!!todayChecks[k];
            return(
              <div key={meal.id} style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginBottom:8,opacity:done?0.5:1,transition:'opacity 0.2s'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <Dot done={done} onClick={()=>toggle(k)}/>
                    <div>
                      <div style={{fontSize:15,fontWeight:700,textDecoration:done?'line-through':'none',color:'var(--text)'}}>{meal.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{meal.time}</div>
                    </div>
                  </div>
                  {meal.kcal!=null&&(
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:22,fontWeight:800,color:A,lineHeight:1}}>{meal.kcal}</div>
                      <div style={{fontSize:10,color:'var(--text3)'}}>kcal</div>
                    </div>
                  )}
                </div>
                {meal.carbs!=null&&(
                <div style={{display:'flex',gap:14,fontSize:12,marginBottom:10,paddingBottom:10,borderBottom:'0.5px solid var(--border)'}}>
                  <span style={{color:'#378ADD',fontWeight:600}}>탄 {meal.carbs}g</span>
                  <span style={{color:T,fontWeight:600}}>단 {meal.protein}g</span>
                  <span style={{color:'#D4537E',fontWeight:600}}>지 {meal.fat}g</span>
                </div>
                )}
                {meal.items.map((item,i)=><div key={i} style={{fontSize:13,color:'var(--text2)',lineHeight:2}}>{item}</div>)}
              </div>
            );
          })}
          {!isRestDay&&(
            <div style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginBottom:8,borderLeft:`3px solid ${A}`}}>
              <div style={{fontSize:12,fontWeight:700,color:A,marginBottom:6}}>치팅밀 (토요일 저녁)</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>한 끼만 자유 · 순단백 120g 매일 사수 · 탄수 350~400g까지 허용</div>
            </div>
          )}
        </>}

        {/* 영양제 */}
        {subTab==='영양제'&&<>
          <div style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase'}}>오늘 영양제 복용</div>
              <div style={{fontSize:16,fontWeight:800,color:A}}>{suppDone} / {SUPPS.length}</div>
            </div>
            <div style={{height:4,background:'#2a2a2a',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.round((suppDone/SUPPS.length)*100)}%`,background:A,transition:'width 0.4s'}}/>
            </div>
          </div>
          {SUPPS.map(s=>{
            const k=`sup_${s.id}`;const done=!!todayChecks[k];
            return(
              <div key={s.id} onClick={()=>toggle(k)}
                style={{background:'var(--bg2)',borderRadius:10,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:12,padding:'12px 14px',
                  marginBottom:6,opacity:done?0.45:1,transition:'opacity 0.2s'}}>
                <Dot done={done} onClick={()=>toggle(k)}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,textDecoration:done?'line-through':'none',color:'var(--text)',marginBottom:3}}>{s.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{s.detail}</div>
                </div>
                <div style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{s.time}</div>
              </div>
            );
          })}
          <div style={{background:'var(--bg2)',borderRadius:12,padding:'14px 16px',marginTop:4,marginBottom:8,border:`0.5px solid rgba(239,159,39,0.2)`}}>
            <div style={{fontSize:11,fontWeight:700,color:A,marginBottom:12,letterSpacing:'0.05em'}}>추가 구매 우선순위</div>
            {[{r:'❶ 필수',n:'크레아틴 모노하이드레이트 500g',p:'~18,000원'},
              {r:'❷ 필수',n:'비타민C 1,000mg 100정',p:'~9,000원'},
              {r:'❸ 권장',n:'비타민D3 2,000IU 240정',p:'~12,000원'},
              {r:'❹ 권장',n:'마그네슘 글리시네이트 300mg',p:'~12,000원'},
            ].map(item=>(
              <div key={item.n} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'8px 0',borderBottom:'0.5px solid var(--border)'}}>
                <span style={{color:'var(--text2)'}}>{item.r} {item.n}</span>
                <span style={{fontWeight:700,color:A,flexShrink:0,marginLeft:8}}>{item.p}</span>
              </div>
            ))}
            <div style={{fontSize:11,color:'var(--text3)',marginTop:10}}>아이허브 $40 이상 무료배송</div>
          </div>
        </>}

        <div style={{height:timerVisible?104:36}}/>
      </div>

      {/* ── fixed rest timer ── */}
      {timerVisible&&(
        <div style={{
          position:'fixed',
          bottom:'max(16px,env(safe-area-inset-bottom))',
          left:'50%',transform:'translateX(-50%)',
          width:'min(448px,calc(100% - 32px))',
          background:'#1a1a1a',
          borderRadius:16,
          padding:'12px 14px',
          border:`1px solid ${timerRem<=3?'rgba(255,96,96,0.4)':A+'40'}`,
          zIndex:20,
          boxShadow:'0 8px 32px rgba(0,0,0,0.7)',
        }}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:3,letterSpacing:'0.1em',fontWeight:700,
                whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:160}}>
                휴식 중 — {restTimer.name}
              </div>
              <div style={{
                fontSize:42,fontWeight:800,lineHeight:1,fontVariantNumeric:'tabular-nums',letterSpacing:'-1px',
                color:timerRem<=3?'#ff6060':A,
                transition:'color 0.3s',
              }}>
                {Math.floor(timerRem/60)}:{String(timerRem%60).padStart(2,'0')}
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
              <div style={{height:3,width:80,background:'#2a2a2a',borderRadius:2,overflow:'hidden'}}>
                <div style={{
                  height:'100%',
                  width:`${restTimer.total>0?Math.min(100,Math.round((timerRem/restTimer.total)*100)):0}%`,
                  background:timerRem<=3?'#ff6060':A,
                  transition:'width 0.25s linear, background 0.3s',
                }}/>
              </div>
              <div style={{display:'flex',gap:5}}>
                <button onClick={()=>adjustTimer(-15)} style={{
                  fontSize:11,padding:'5px 8px',border:'0.5px solid var(--border2)',
                  borderRadius:7,background:'transparent',color:'var(--text3)',
                }}>-15s</button>
                <button onClick={()=>adjustTimer(15)} style={{
                  fontSize:11,padding:'5px 8px',border:'0.5px solid var(--border2)',
                  borderRadius:7,background:'transparent',color:'var(--text3)',
                }}>+15s</button>
                <button onClick={()=>{clearTimeout(timeoutRef.current);clearInterval(intervalRef.current);setRestTimer(null);}} style={{
                  fontSize:11,padding:'5px 10px',border:'0.5px solid var(--border2)',
                  borderRadius:7,background:'transparent',color:'var(--text3)',
                }}>건너뛰기</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── calendar overlay ── */}
      {showCal&&(
        <div style={{position:'fixed',inset:0,zIndex:30,background:'var(--bg)',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'max(16px,env(safe-area-inset-top)) 16px 14px',borderBottom:'0.5px solid var(--border)',
            display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:800,color:'var(--text3)',letterSpacing:'0.15em',textTransform:'uppercase'}}>기록 달력</div>
            <button onClick={()=>setShowCal(false)} style={{width:34,height:34,border:'0.5px solid var(--border)',
              borderRadius:10,background:'transparent',color:'var(--text)',fontSize:18}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px 0',WebkitOverflowScrolling:'touch'}}>
            <CalendarView calMonth={calMonth} setCalMonth={(m)=>{
              setCalMonth(m);
              setCalLoading(true);
              dbGetMonth(m.year,m.month).then(rows=>{
                const data={};
                for(const row of rows){
                  if(!data[row.date_key])data[row.date_key]={};
                  if(row.store_key==='workout_v2')data[row.date_key].workout=true;
                  if(row.store_key==='checks')data[row.date_key].checks=true;
                }
                setCalData(data);
              }).catch(e=>console.error(e)).finally(()=>setCalLoading(false));
            }} calData={calData} calLoading={calLoading}
              onSelectDate={(dk)=>{setHistoryDate(dk);}}/>
            <div style={{height:40}}/>
          </div>
        </div>
      )}

      {/* ── history detail ── */}
      {historyDate&&(
        <HistoryView dateKey={historyDate} historyData={historyData}
          historyLoading={historyLoading}
          onClose={()=>setHistoryDate(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
}
</script>
</body>
</html>
